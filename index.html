<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tennis Card Game</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header style="text-align: center; margin-bottom: 10px;">
    <h1 style="font-size: 22px; margin: 6px 0;">🎾 Tennis Card Game</h1>

    <div id="tennis-score" style="margin-bottom: 8px;">Loading score...</div>

    <div style="display:inline-flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:8px;">
      <button id="sim-btn"
        onclick="runSimulation()"
        style="background:#8e44ad;color:white;font-weight:bold;font-size:13px;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;">
        ▶ Simulate 10,000 Points
      </button>
      <div id="sim-version-controls"></div>
    </div>
    <div id="fatigue-toggle" style="background: #fff; padding: 8px 14px; border: 2px solid #333; border-radius: 8px; display: inline-block;">
      <label style="font-weight: bold; margin-right: 10px; font-size: 13px;">Fatigue System:</label>
      <label style="margin-right: 15px; font-size: 13px;">
        <input type="radio" name="fatigue-system" value="1" onchange="switchFatigueSystem(1)">
        V1 (per Shot)
      </label>
      <label style="font-size: 13px;">
        <input type="radio" name="fatigue-system" value="2" checked onchange="switchFatigueSystem(2)">
        V2 (per Draw/OOP)
      </label>
    </div>
  </header>

  <!-- Card legend -->
  <div style="text-align:center; margin-bottom:10px; font-size:12px; display:flex; gap:16px; justify-content:center; flex-wrap:wrap;">
    <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;border:3px solid #c0392b;background:#fff8f8;border-radius:3px;display:inline-block;"></span>Attack</span>
    <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;border:3px solid #2980b9;background:#f5faff;border-radius:3px;display:inline-block;"></span>Defense</span>
    <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;border:3px solid #27ae60;background:#f5fff8;border-radius:3px;display:inline-block;"></span>Volley</span>
    <span style="display:inline-flex;align-items:center;gap:5px;"><span style="width:14px;height:14px;border:3px solid #8e44ad;background:#fdf5ff;border-radius:3px;display:inline-block;"></span>Serve</span>
    <span style="color:#aaa;">| Faded = not playable</span>
  </div>

  <main>
    <div id="players-container">
      <div id="player1" class="player-panel">
        <h2>Player 1</h2>
      </div>

      <!-- Current shot info panel -->
      <div id="current-turn" class="current-turn-panel">
        <div class="ct-title">Текущий ход</div>
        <div class="ct-empty">— Подача —</div>
      </div>

      <div id="player2" class="player-panel">
        <h2>Player 2</h2>
      </div>
    </div>

    <section id="dice-and-court-section">
      <h2>Dice Rolls &amp; Court Position</h2>
      <div id="dice-and-court-container">
        <div class="player-dice" id="player1-dice">
          <h3>Player 1 Rolls</h3>
          <div class="dice-display"></div>
        </div>

        <div id="court">
          <div class="court-half p1-side">
            <!-- Court lines: service line + center service line -->
            <div class="court-line service-line"></div>
            <div class="court-line center-line"></div>
            <div class="zone back-left"  data-id="p1-BL"></div>
            <div class="zone back-right" data-id="p1-BR"></div>
            <div class="zone net"        data-id="p1-Net"></div>
          </div>

          <div class="net-divider"></div>

          <div class="court-half p2-side">
            <!-- Court lines: service line + center service line -->
            <div class="court-line service-line"></div>
            <div class="court-line center-line"></div>
            <div class="zone net"        data-id="p2-Net"></div>
            <div class="zone back-right" data-id="p2-BR"></div>
            <div class="zone back-left"  data-id="p2-BL"></div>
          </div>
        </div>

        <div class="player-dice" id="player2-dice">
          <h3>Player 2 Rolls</h3>
          <div class="dice-display"></div>
        </div>
      </div>
    </section>

    <section id="log-section">
      <h2>Game Log</h2>
      <div id="log" class="log-panel"></div>
    </section>
  </main>

  <script src="config.js"></script>
  <script src="decks.js"></script>
  <script src="deck-utils.js"></script>
  <script src="positioning.js"></script>
  <script src="visuals.js"></script>
  <script src="dice-visuals.js"></script>
  <script src="shot-resolution.js"></script>
  <script src="player-init.js"></script>
  <script src="render.js"></script>
  <script src="ai-v1.js"></script>
  <script src="ai-v2.js"></script>
  <script src="ai-v3.js"></script>
  <script src="ai.js"></script>
  <script src="ai-simulate-v1.js"></script>
  <script src="ai-simulate-v2.js"></script>
  <script src="ai-simulate-v3.js"></script>
  <script src="ai-simulate.js"></script>
  <script src="ai-v3-train.js"></script>
  <script src="game.js"></script>
  <script>renderSimControls(); renderV3TrainUI();</script>
</body>
</html>
