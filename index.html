<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>🎾 MyTennis</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="styles-app.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       BLOCK 1 — SCORE BAR
  ════════════════════════════════════════════ -->
  <div id="tennis-score">Loading score...</div>

  <!-- ═══════════════════════════════════════════
       BLOCK 2 — COURT (horizontal: P1 left, P2 right)
       Zone data-ids are queried by visuals.js — do not rename.
       P2 orientation: BR top / BL bottom (players face each other,
       serves land cross-court into the same-named zone).
  ════════════════════════════════════════════ -->
  <div id="app-court-wrap">
    <div id="court">
      <!-- decorative layers -->
      <div class="baseline-shade shade-left"></div>
      <div class="baseline-shade shade-right"></div>
      <div class="service-line line-left"></div>
      <div class="service-line line-right"></div>
      <div class="center-line"></div>

      <!-- net -->
      <div class="net-line"></div>
      <div class="net-post net-post-top"></div>
      <div class="net-post net-post-bottom"></div>

      <!-- P1 zones (left half). Labels are display-only; data-id keys stay ASCII. -->
      <div class="zone" data-id="p1-BL">Слева</div>
      <div class="zone" data-id="p1-BR">Справа</div>
      <div class="zone" data-id="p1-Net">Сетка</div>

      <!-- P2 zones (right half) — BR top, BL bottom -->
      <div class="zone" data-id="p2-Net">Сетка</div>
      <div class="zone" data-id="p2-BR">Справа</div>
      <div class="zone" data-id="p2-BL">Слева</div>

      <!-- corner labels -->
      <div class="court-label label-p1">P1 (вы)</div>
      <div class="court-label label-p2">P2 (ИИ)</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       BLOCK 3 — CURRENT TURN + DICE
  ════════════════════════════════════════════ -->
  <div id="app-turn-section">

    <div id="current-turn" class="current-turn-panel">
      <div class="ct-title">Текущий ход</div>
      <div class="ct-empty">— Подача —</div>
    </div>

    <div id="app-dice-wrap">
      <div class="player-dice" id="player1-dice">
        <div class="app-dice-label">🎲 Бросок</div>
        <div class="dice-display"></div>
      </div>
      <!-- kept in DOM so dice-visuals.js doesn't break, but hidden -->
      <div class="player-dice" id="player2-dice" style="display:none;">
        <div class="dice-display"></div>
      </div>
    </div>

  </div>

  <!-- ═══════════════════════════════════════════
       BLOCK 3.5 — LOG TICKER (tap to expand)
  ════════════════════════════════════════════ -->
  <div id="app-log" onclick="toggleLogOverlay(true)" title="Открыть журнал">
    <span class="app-log-icon">📋</span>
    <div class="app-log-lines">
      <div class="app-log-line">— начните розыгрыш —</div>
    </div>
    <span class="app-log-more">▲</span>
  </div>

  <!-- Full-history overlay -->
  <div id="log-overlay" onclick="if(event.target===this)toggleLogOverlay(false)">
    <div class="log-sheet">
      <div class="log-sheet-head">
        <strong>Журнал</strong>
        <button class="log-close" onclick="toggleLogOverlay(false)">✕</button>
      </div>
      <div class="log-sheet-body" id="log-full"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       BLOCK 4 — AI STRIP + PLAYER HAND
  ════════════════════════════════════════════ -->
  <div id="app-hand-section">

    <!-- AI opponent strip — render.js fills #player2 -->
    <div id="player2" class="app-opponent-strip"></div>

    <!-- Human player panel — render.js fills #player1 -->
    <div id="player1" class="player-panel app-player-panel"></div>

    <div class="scroll-hint">← прокрутите карты →</div>

  </div>

  <!-- Log: kept in DOM, hidden — render.js requires #log -->
  <div id="log" style="display:none;"></div>

  <!-- ═══════════════════════════════════════════
       CARD DETAIL SHEET (tap a card to open)
  ════════════════════════════════════════════ -->
  <div id="card-overlay" onclick="if(event.target===this)closeCardSheet()">
    <div class="card-sheet">
      <div class="log-sheet-head">
        <strong>🃏 Карта</strong>
        <button class="log-close" onclick="closeCardSheet()">✕</button>
      </div>
      <div class="card-sheet-body" id="card-sheet-body"></div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       RULES OVERLAY (renders RULES.md)
  ════════════════════════════════════════════ -->
  <div id="rules-overlay">
    <div class="rules-sheet">
      <div class="log-sheet-head">
        <strong>📖 Правила</strong>
        <button class="log-close" onclick="closeRules()">✕</button>
      </div>
      <div class="rules-body" id="rules-body">Загрузка…</div>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════
       MAIN MENU (open on load)
  ════════════════════════════════════════════ -->
  <div id="menu-overlay" class="open">
    <div class="menu-inner">
      <div class="menu-logo">🎾</div>
      <div class="menu-title">MyTennis</div>
      <div class="menu-sub">Карточный теннис</div>
      <button class="menu-btn menu-btn-play" onclick="menuPlay()">▶&nbsp; Играть</button>
      <div class="menu-difficulty">
        <div class="menu-diff-label">Сложность ИИ</div>
        <div class="menu-diff-toggle">
          <button id="diff-easy" class="menu-diff-btn" onclick="setDifficulty('easy')">Легко</button>
          <button id="diff-hard" class="menu-diff-btn" onclick="setDifficulty('hard')">Сложно</button>
        </div>
      </div>
      <button class="menu-btn" onclick="menuTutorial()">🎓&nbsp; Обучение</button>
      <button class="menu-btn" onclick="openRules()">📖&nbsp; Правила</button>
    </div>
  </div>

  <!-- reopen-menu button, floats over the score bar (left) -->
  <button id="menu-btn" onclick="openMenu()" title="Меню">☰</button>

  <!-- new-match button, floats over the score bar (right) -->
  <button id="new-match-btn" onclick="newMatch()" title="Новая партия">⟳&nbsp;Партия</button>

  <!-- ═══════════════════════════════════════════
       SCRIPTS
  ════════════════════════════════════════════ -->
  <script src="config.js"></script>
  <script src="decks.js"></script>
  <script src="deck-utils.js"></script>
  <script src="positioning.js"></script>
  <script src="visuals.js"></script>
  <script src="dice-visuals.js"></script>
  <script src="shot-resolution.js"></script>
  <script src="player-init.js"></script>
  <script src="render.js"></script>
  <script src="ai-v1.js"></script>
  <script src="ai-v2.js"></script>
  <script src="ai-v3.js"></script>
  <script src="ai.js"></script>
  <script src="ai-simulate-v1.js"></script>
  <script src="ai-simulate-v2.js"></script>
  <script src="ai-simulate-v3.js"></script>
  <script src="ai-simulate.js"></script>
  <script src="ai-v3-train.js"></script>
  <script src="game.js"></script>
  <script src="tutorial.js"></script>

  <script>
    // Route every dice roll — player's or AI's — into the one visible block.
    window.DICE_SINGLE_TARGET = 'player1-dice';

    // ── Event log (mobile) ──────────────────────────────────
    // The ticker shows the most recent line; tapping opens the full history.
    function renderMobileLog() {
      if (typeof gameLog === 'undefined') return;
      const box = document.querySelector('#app-log .app-log-lines');
      // Last two events, oldest on top / newest at the bottom. Each stays one
      // row (the <br> inside shot lines is collapsed to a middot).
      if (box && gameLog.length) {
        box.innerHTML = gameLog.slice(-2)
          .map(s => `<div class="app-log-line">${s.replace(/<br\s*\/?>/gi, ' · ')}</div>`)
          .join('');
      }
      const overlay = document.getElementById('log-overlay');
      if (overlay && overlay.classList.contains('open')) {
        document.getElementById('log-full').innerHTML =
          [...gameLog].reverse().join('<div class="log-sep"></div>');
      }
    }

    function toggleLogOverlay(open) {
      const overlay = document.getElementById('log-overlay');
      if (!overlay) return;
      overlay.classList.toggle('open', open);
      if (open) {
        document.getElementById('log-full').innerHTML =
          (typeof gameLog !== 'undefined' ? [...gameLog].reverse() : []).join('<div class="log-sep"></div>');
      }
    }

    // ── New match (top ribbon) ──────────────────────────────
    // Restarts the whole match (score, games, decks) without opening the menu.
    // Confirms first so a stray tap doesn't wipe a match in progress.
    function newMatch() {
      const go = () => { if (typeof startGame === 'function') startGame(); };
      const q = 'Начать новую партию? Текущий счёт будет сброшен.';
      // tg.showConfirm exists but throws WebAppMethodUnsupported on older
      // Telegram WebViews (Bot API < 6.2) — version-gate it, then fall back to
      // a native confirm (the try/catch is a belt-and-suspenders guard).
      const canShowConfirm = tg && typeof tg.showConfirm === 'function' &&
        (typeof tg.isVersionAtLeast !== 'function' || tg.isVersionAtLeast('6.2'));
      if (canShowConfirm) {
        try { tg.showConfirm(q, ok => { if (ok) go(); }); return; }
        catch (e) { /* unsupported — fall through */ }
      }
      if (window.confirm(q)) go();
    }

    // ── Main menu ───────────────────────────────────────────
    function openMenu()  { document.getElementById('menu-overlay').classList.add('open'); }
    function closeMenu() { document.getElementById('menu-overlay').classList.remove('open'); }
    function menuPlay()  { closeMenu(); }
    function menuTutorial() {
      closeMenu();
      if (typeof startTutorial === 'function') startTutorial();
    }

    // Difficulty: Легко = AI v2 (heuristic baseline), Сложно = AI v3 (network)
    function setDifficulty(level, save = true) {
      aiSetVersion(1, level === 'easy' ? 2 : 3);
      document.getElementById('diff-easy').classList.toggle('active', level === 'easy');
      document.getElementById('diff-hard').classList.toggle('active', level !== 'easy');
      if (save) { try { localStorage.setItem('mytennis-difficulty', level); } catch (e) {} }
    }

    // ── Rules overlay: fetch RULES.md, render a markdown subset ──
    let rulesLoaded = false;
    function openRules() {
      document.getElementById('rules-overlay').classList.add('open');
      if (rulesLoaded) return;
      fetch('RULES.md')
        .then(r => r.text())
        .then(md => { document.getElementById('rules-body').innerHTML = renderMarkdown(md); rulesLoaded = true; })
        .catch(() => { document.getElementById('rules-body').textContent = 'Не удалось загрузить правила.'; });
    }
    function closeRules() { document.getElementById('rules-overlay').classList.remove('open'); }

    // Covers what RULES.md actually uses: headings, bold/italic/code, lists,
    // tables, fenced code blocks, horizontal rules.
    function renderMarkdown(md) {
      const inline = s => s
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
        .replace(/\*([^*]+)\*/g, '<em>$1</em>');
      const out = [];
      let list = null, table = null, inCode = false, codeBuf = [];
      const flushList  = () => { if (list)  { out.push(`<${list.tag}>${list.items.join('')}</${list.tag}>`); list = null; } };
      const flushTable = () => { if (table) { out.push(`<table>${table.join('')}</table>`); table = null; } };
      for (const line of md.split(/\r?\n/)) {
        if (inCode) {
          if (/^```/.test(line)) { out.push(`<pre>${codeBuf.join('\n')}</pre>`); inCode = false; codeBuf = []; }
          else codeBuf.push(line.replace(/&/g, '&amp;').replace(/</g, '&lt;'));
          continue;
        }
        if (/^```/.test(line)) { flushList(); flushTable(); inCode = true; continue; }
        if (/^\|/.test(line.trim())) {
          flushList();
          if (/^\|[\s\-|:]+\|$/.test(line.trim())) continue;  // |---|---| separator
          const tag = table ? 'td' : 'th';
          const cells = line.trim().replace(/^\||\|$/g, '').split('|')
            .map(c => `<${tag}>${inline(c.trim())}</${tag}>`).join('');
          (table = table || []).push(`<tr>${cells}</tr>`);
          continue;
        }
        flushTable();
        const h = line.match(/^(#{1,4})\s+(.*)/);
        if (h) { flushList(); const lvl = h[1].length + 1; out.push(`<h${lvl}>${inline(h[2])}</h${lvl}>`); continue; }
        if (/^---+\s*$/.test(line)) { flushList(); out.push('<hr>'); continue; }
        const ul = line.match(/^\s*[-*]\s+(.*)/);
        if (ul) { if (!list || list.tag !== 'ul') { flushList(); list = { tag: 'ul', items: [] }; } list.items.push(`<li>${inline(ul[1])}</li>`); continue; }
        const ol = line.match(/^\s*\d+\.\s+(.*)/);
        if (ol) { if (!list || list.tag !== 'ol') { flushList(); list = { tag: 'ol', items: [] }; } list.items.push(`<li>${inline(ol[1])}</li>`); continue; }
        if (!line.trim()) { flushList(); continue; }
        flushList();
        out.push(`<p>${inline(line)}</p>`);
      }
      flushList(); flushTable();
      return out.join('');
    }

    // ── Telegram Mini App init ──────────────────────────────
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
      tg.enableClosingConfirmation();
      tg.setHeaderColor('#1a5276');
      tg.setBackgroundColor('#0d0d1a');
      // Horizontal card scroll conflicts with swipe-to-close (TG 7.7+)
      if (typeof tg.disableVerticalSwipes === 'function') tg.disableVerticalSwipes();
    }

    // ── Load v3 weights from file and configure AI ──────────
    window.addEventListener('load', () => {
      // Weight sets predating the LayerNorm/LeakyReLU network are incompatible
      // (same dimensions, meaningless values) — retrain with train-v3-node.js
      // rather than restoring one from git history.
      fetch('v3-weights-pure.json')
        .then(res => res.json())
        .then(weightsData => {
          v3WeightsFromJSON(weightsData);
          console.log('✓ v3-weights-pure.json loaded');
        })
        .catch(err => console.warn('Could not load v3-weights-pure.json:', err));

      // Difficulty from the menu (persisted): Легко = v2, Сложно = v3
      let savedDifficulty = 'hard';
      try { savedDifficulty = localStorage.getItem('mytennis-difficulty') || 'hard'; } catch (e) {}
      setDifficulty(savedDifficulty, false);
      aiSetAutoMode(1, true);   // P2 plays automatically
    });
  </script>

</body>
</html>
