<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Tennis Card Game - Mobile</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="mini.css">
</head>
<body>

  <!-- Loading indicator -->
  <div id="loading-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:1000;font-size:18px;color:white;">
    Loading game & AI weights...
  </div>

  <header style="text-align: center; margin-bottom: 8px;">
    <h1 style="font-size: 18px; margin: 4px 0;">🎾 tennis</h1>
    <div id="tennis-score" style="margin-bottom: 4px;">Loading score...</div>
  </header>

  <main id="mini-game-container">
    <!-- Court and dice section -->
    <section id="court-and-dice-section">
      <div id="dice-and-court-container" style="display: flex; gap: 8px; margin-bottom: 8px;">
        <div class="player-dice mini-dice" id="player1-dice">
          <h4 style="margin:0;font-size:11px;">P1</h4>
          <div class="dice-display" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
        </div>

        <div id="court" style="flex: 1;">
          <div class="court-half p1-side">
            <div class="court-line service-line"></div>
            <div class="court-line center-line"></div>
            <div class="zone back-left"  data-id="p1-BL"></div>
            <div class="zone back-right" data-id="p1-BR"></div>
            <div class="zone net"        data-id="p1-Net"></div>
          </div>
          <div class="net-divider"></div>
          <div class="court-half p2-side">
            <div class="court-line service-line"></div>
            <div class="court-line center-line"></div>
            <div class="zone net"        data-id="p2-Net"></div>
            <div class="zone back-right" data-id="p2-BR"></div>
            <div class="zone back-left"  data-id="p2-BL"></div>
          </div>
        </div>

        <div class="player-dice mini-dice" id="player2-dice">
          <h4 style="margin:0;font-size:11px;">P2</h4>
          <div class="dice-display" style="display:flex;gap:4px;flex-wrap:wrap;"></div>
        </div>
      </div>

      <!-- Last shot info -->
      <div id="last-shot-info" class="mini-last-shot">
        <div class="mini-shot-panel">
          <strong style="font-size:11px;">P1 Last</strong>
          <div id="p1-last-shot" style="font-size:12px;color:#2980b9;min-height:20px;">—</div>
        </div>
        <div class="mini-shot-panel">
          <strong style="font-size:11px;">P2 Last</strong>
          <div id="p2-last-shot" style="font-size:12px;color:#e74c3c;min-height:20px;">—</div>
        </div>
      </div>
    </section>

    <!-- Player hand section -->
    <section id="player-hand-section">
      <div class="mini-hand-controls">
        <button id="draw-btn" class="mini-btn mini-btn-primary" onclick="handleMiniDraw()" style="display:none;">
          Draw
        </button>
        <button id="pass-btn" class="mini-btn mini-btn-secondary" onclick="handleMiniPass()" style="display:none;">
          Pass Turn
        </button>
        <span id="hand-status" style="font-size:12px;color:#666;"></span>
      </div>
      <div id="mini-hand" class="mini-hand-container"></div>
    </section>

    <!-- Game log section -->
    <section id="log-section" style="margin-top: 8px;">
      <h4 style="margin: 4px 0; font-size: 12px;">Game Log</h4>
      <div id="log" class="mini-log-panel"></div>
    </section>
  </main>

  <!-- Script imports -->
  <script src="config.js"></script>
  <script src="decks.js"></script>
  <script src="deck-utils.js"></script>
  <script src="positioning.js"></script>
  <script src="visuals.js"></script>
  <script src="dice-visuals.js"></script>
  <script src="shot-resolution.js"></script>
  <script src="player-init.js"></script>
  <script src="render.js"></script>
  <script src="ai-v1.js"></script>
  <script src="ai-v2.js"></script>
  <script src="ai-v3.js"></script>
  <script src="ai.js"></script>
  <script src="ai-simulate-v1.js"></script>
  <script src="ai-simulate-v2.js"></script>
  <script src="ai-simulate-v3.js"></script>
  <script src="ai-simulate.js"></script>
  <script src="ai-v3-train.js"></script>
  <script src="game.js"></script>
  <script src="mini-render.js"></script>
  <script src="mini-game.js"></script>
</body>
</html>
